<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabble Multiplayer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        .join-screen {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
        }
        input, button {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #4caf50;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #45a049; transform: translateY(-2px); }
        .game-container { display: none; }
        .board {
            display: grid;
            grid-template-columns: repeat(15, 40px);
            gap: 2px;
            margin: 20px auto;
            justify-content: center;
            background: #3e2723;
            padding: 10px;
            border-radius: 10px;
        }
        .cell {
            width: 40px;
            height: 40px;
            background: #f5deb3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 3px;
        }
        .cell:hover {
            transform: scale(1.05);
            z-index: 1;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        .rack {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
            background: #4e342e;
            padding: 20px;
            border-radius: 10px;
        }
        .rack-tile {
            width: 60px;
            height: 60px;
            background: linear-gradient(180deg, #fffef5 0%, #e0d5c0 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            color: #2c1810;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .rack-tile:hover {
            transform: translateY(-5px);
        }
        .rack-tile.selected {
            border: 3px solid gold;
            transform: translateY(-10px);
            box-shadow: 0 8px 16px rgba(255,215,0,0.4);
        }
        .player-info {
            display: inline-block;
            margin: 20px;
            padding: 15px 25px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            min-width: 180px;
        }
        .active {
            border: 2px solid gold;
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        #message {
            margin: 10px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
        }
        .game-code {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            font-size: 28px;
            font-family: monospace;
            margin: 10px 0;
            letter-spacing: 3px;
        }
        .status { margin-top: 20px; color: #ffd700; }
        .score-value { font-size: 24px; font-weight: bold; color: #ffd700; }
        .premium-tw { background: #d32f2f; color: white; }
        .premium-dw { background: #f48fb1; color: #5d0000; }
        .premium-tl { background: #1565c0; color: white; }
        .premium-dl { background: #90caf9; color: #003c8f; }
        .center-star { background: #f5deb3; position: relative; }
        .center-star::after {
            content: '★';
            position: absolute;
            color: #d4a574;
            font-size: 20px;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Scrabble Multiplayer</h1>
        
        <!-- Join Screen -->
        <div id="joinScreen" class="join-screen">
            <h2>Welcome to Scrabble!</h2>
            <button id="createBtn">🎮 Create New Game</button>
            <button id="joinBtn">🔗 Join Existing Game</button>
            
            <div id="createPanel" style="display:none; margin-top:20px;">
                <input type="text" id="playerName" placeholder="Your Name" autocomplete="off">
                <button id="confirmCreate">Create Game</button>
                <button id="cancelCreate">Cancel</button>
            </div>
            
            <div id="joinPanel" style="display:none; margin-top:20px;">
                <input type="text" id="gameCode" placeholder="Game Code" autocomplete="off" style="text-transform:uppercase">
                <input type="text" id="joinPlayerName" placeholder="Your Name" autocomplete="off">
                <button id="confirmJoin">Join Game</button>
                <button id="cancelJoin">Cancel</button>
            </div>
            
            <div id="waitingPanel" style="display:none; margin-top:20px;">
                <h3>Share this code with your friend:</h3>
                <div class="game-code" id="gameCodeDisplay"></div>
                <button id="copyCode">📋 Copy Code</button>
                <div class="status">⏳ Waiting for Player 2 to join...</div>
            </div>
        </div>
        
        <!-- Game Container -->
        <div id="gameContainer" class="game-container">
            <div>
                <div id="p1Info" class="player-info">
                    <strong id="p1Name">Player 1</strong><br>
                    Score: <span class="score-value" id="p1Score">0</span>
                </div>
                <div id="p2Info" class="player-info">
                    <strong id="p2Name">Player 2</strong><br>
                    Score: <span class="score-value" id="p2Score">0</span>
                </div>
            </div>
            
            <div id="board" class="board"></div>
            <div id="message">Loading game...</div>
            <div id="rack" class="rack"></div>
            
            <div style="margin-top: 20px;">
                <button id="playWordBtn" style="background: #4caf50;">▶ Play Word</button>
                <button id="recallBtn" style="background: #ff9800;">↩ Recall</button>
                <button id="exchangeBtn" style="background: #9c27b0;">🔄 Exchange</button>
                <button id="passBtn" style="background: #607d8b;">⏭ Pass</button>
            </div>
        </div>
    </div>

    <script>
        // Premium squares configuration
        const premiumSquares = {};
        
        // Triple Word
        [[0,0],[0,7],[0,14],[7,0],[7,14],[14,0],[14,7],[14,14]].forEach(([r,c]) => premiumSquares[`${r},${c}`] = 'tw');
        // Double Word
        [[1,1],[1,13],[2,2],[2,12],[3,3],[3,11],[4,4],[4,10],[10,4],[10,10],[11,3],[11,11],[12,2],[12,12],[13,1],[13,13]].forEach(([r,c]) => premiumSquares[`${r},${c}`] = 'dw');
        // Triple Letter
        [[1,5],[1,9],[5,1],[5,5],[5,9],[5,13],[9,1],[9,5],[9,9],[9,13],[13,5],[13,9]].forEach(([r,c]) => premiumSquares[`${r},${c}`] = 'tl');
        // Double Letter
        [[0,3],[0,11],[2,6],[2,8],[3,0],[3,7],[3,14],[6,2],[6,6],[6,8],[6,12],[7,3],[7,11],[8,2],[8,6],[8,8],[8,12],[11,0],[11,7],[11,14],[12,6],[12,8],[14,3],[14,11]].forEach(([r,c]) => premiumSquares[`${r},${c}`] = 'dl');
        
        // Global variables
        let socket = null;
        let gameId = null;
        let myPlayerNumber = null;
        let currentTurn = 1;
        let myRack = [];
        let selectedTileIndex = null;
        let placedTiles = new Map();
        let boardData = Array(15).fill().map(() => Array(15).fill(null));
        
        // DOM elements
        const joinScreen = document.getElementById('joinScreen');
        const gameContainer = document.getElementById('gameContainer');
        const createPanel = document.getElementById('createPanel');
        const joinPanel = document.getElementById('joinPanel');
        const waitingPanel = document.getElementById('waitingPanel');
        
        // Button handlers
        document.getElementById('createBtn').onclick = () => {
            createPanel.style.display = 'block';
            joinPanel.style.display = 'none';
            waitingPanel.style.display = 'none';
        };
        
        document.getElementById('joinBtn').onclick = () => {
            createPanel.style.display = 'none';
            joinPanel.style.display = 'block';
            waitingPanel.style.display = 'none';
        };
        
        document.getElementById('cancelCreate').onclick = () => {
            createPanel.style.display = 'none';
        };
        
        document.getElementById('cancelJoin').onclick = () => {
            joinPanel.style.display = 'none';
        };
        
        document.getElementById('confirmCreate').onclick = () => {
            const playerName = document.getElementById('playerName').value.trim();
            if (!playerName) {
                alert('Please enter your name');
                return;
            }
            createGame(playerName);
        };
        
        document.getElementById('confirmJoin').onclick = () => {
            const code = document.getElementById('gameCode').value.trim().toUpperCase();
            const playerName = document.getElementById('joinPlayerName').value.trim();
            if (!code || !playerName) {
                alert('Please enter game code and your name');
                return;
            }
            joinGame(code, playerName);
        };
        
        document.getElementById('copyCode').onclick = () => {
            const code = document.getElementById('gameCodeDisplay').innerText;
            navigator.clipboard.writeText(code);
            alert('Game code copied: ' + code);
        };
        
        function createGame(playerName) {
            console.log('Creating game for:', playerName);
            
            socket = io();
            
            socket.on('connect', () => {
                console.log('Socket connected! ID:', socket.id);
                socket.emit('createGame', { playerName: playerName }, (response) => {
                    console.log('Create game response:', response);
                    if (response && response.success) {
                        gameId = response.gameId;
                        myPlayerNumber = response.playerNum;
                        document.getElementById('gameCodeDisplay').innerText = gameId;
                        createPanel.style.display = 'none';
                        waitingPanel.style.display = 'block';
                        setupGameListeners();
                    } else {
                        alert('Failed to create game: ' + (response?.error || 'Unknown error'));
                    }
                });
            });
            
            socket.on('connect_error', (error) => {
                console.error('Connection error:', error);
                alert('Failed to connect to server. Please refresh the page.');
            });
        }
        
        function joinGame(code, playerName) {
            console.log('Joining game:', code, playerName);
            
            socket = io();
            
            socket.on('connect', () => {
                console.log('Socket connected! ID:', socket.id);
                socket.emit('joinGame', { gameId: code, playerName: playerName }, (response) => {
                    console.log('Join game response:', response);
                    if (response && response.success) {
                        gameId = code;
                        myPlayerNumber = response.playerNum;
                        startGame();
                        setupGameListeners();
                    } else {
                        alert('Failed to join game: ' + (response?.error || 'Unknown error'));
                    }
                });
            });
            
            socket.on('connect_error', (error) => {
                console.error('Connection error:', error);
                alert('Failed to connect to server. Please refresh the page.');
            });
        }
        
        function startGame() {
            joinScreen.style.display = 'none';
            gameContainer.style.display = 'block';
        }
        
        function setupGameListeners() {
            socket.on('gameStateUpdate', (data) => {
                console.log('Game state update received:', data);
                boardData = data.board;
                currentTurn = data.currentTurn;
                
                // Update player info
                document.getElementById('p1Name').innerText = data.players[1].name;
                document.getElementById('p1Score').innerText = data.players[1].score;
                document.getElementById('p2Name').innerText = data.players[2].name || 'Waiting...';
                document.getElementById('p2Score').innerText = data.players[2].score || 0;
                
                // Highlight active player
                document.getElementById('p1Info').classList.toggle('active', currentTurn === 1);
                document.getElementById('p2Info').classList.toggle('active', currentTurn === 2);
                
                // Update my rack
                if (myPlayerNumber === 1) {
                    myRack = data.players[1].rack || [];
                } else {
                    myRack = data.players[2].rack || [];
                }
                
                // Update message
                const isMyTurn = (currentTurn === myPlayerNumber);
                const msgDiv = document.getElementById('message');
                if (isMyTurn) {
                    msgDiv.innerHTML = '🎯 YOUR TURN! Click on a tile in your rack, then click on the board to place it.';
                    msgDiv.style.background = 'rgba(76, 175, 80, 0.3)';
                } else {
                    msgDiv.innerHTML = `⏳ Waiting for ${data.players[currentTurn]?.name || `Player ${currentTurn}`}'s turn...`;
                    msgDiv.style.background = 'rgba(0,0,0,0.5)';
                }
                
                if (data.lastPlay) {
                    msgDiv.innerHTML = `🎉 ${data.players[data.lastPlay.player]?.name || `Player ${data.lastPlay.player}`} played "${data.lastPlay.word}" for ${data.lastPlay.score} points!`;
                    setTimeout(() => {
                        if (isMyTurn) {
                            msgDiv.innerHTML = '🎯 YOUR TURN! Click on a tile in your rack, then click on the board to place it.';
                        } else {
                            msgDiv.innerHTML = `⏳ Waiting for ${data.players[currentTurn]?.name || `Player ${currentTurn}`}'s turn...`;
                        }
                    }, 3000);
                }
                
                renderBoard();
                renderRack();
            });
            
            socket.on('playerDisconnected', (data) => {
                alert(`Player ${data.playerNum} disconnected! Game will end.`);
                location.reload();
            });
        }
        
        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            
            for (let row = 0; row < 15; row++) {
                for (let col = 0; col < 15; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    // Add premium square styling
                    const premium = premiumSquares[`${row},${col}`];
                    if (premium === 'tw') cell.classList.add('premium-tw');
                    else if (premium === 'dw') cell.classList.add('premium-dw');
                    else if (premium === 'tl') cell.classList.add('premium-tl');
                    else if (premium === 'dl') cell.classList.add('premium-dl');
                    
                    // Show premium text on empty cells
                    if (!boardData[row][col] && !placedTiles.get(`${row},${col}`)) {
                        if (premium === 'tw') cell.innerHTML = 'TW';
                        else if (premium === 'dw') cell.innerHTML = 'DW';
                        else if (premium === 'tl') cell.innerHTML = 'TL';
                        else if (premium === 'dl') cell.innerHTML = 'DL';
                        else if (row === 7 && col === 7) cell.classList.add('center-star');
                    }
                    
                    const permanentTile = boardData[row][col];
                    const myPlacedTile = placedTiles.get(`${row},${col}`);
                    
                    if (myPlacedTile) {
                        cell.innerHTML = myPlacedTile.letter;
                        cell.style.background = '#c8e6c9';
                        cell.style.border = '2px solid #4caf50';
                        cell.style.fontSize = '20px';
                        cell.style.fontWeight = 'bold';
                        cell.onclick = () => removeTile(row, col);
                    } else if (permanentTile) {
                        cell.innerHTML = permanentTile.letter;
                        cell.style.background = '#fffef5';
                        cell.style.fontSize = '20px';
                        cell.style.fontWeight = 'bold';
                        cell.onclick = null;
                    } else {
                        if (currentTurn === myPlayerNumber) {
                            cell.onclick = () => placeTile(row, col);
                            cell.style.cursor = 'pointer';
                        }
                    }
                    
                    boardDiv.appendChild(cell);
                }
            }
        }
        
        function placeTile(row, col) {
            if (currentTurn !== myPlayerNumber) {
                alert('Not your turn!');
                return;
            }
            
            if (boardData[row][col] !== null) {
                alert('Cell already has a tile!');
                return;
            }
            
            if (selectedTileIndex === null) {
                alert('First, click on a tile in your rack to select it!');
                return;
            }
            
            const tile = myRack[selectedTileIndex];
            if (!tile) return;
            
            placedTiles.set(`${row},${col}`, {
                letter: tile,
                rackIndex: selectedTileIndex
            });
            
            myRack.splice(selectedTileIndex, 1);
            selectedTileIndex = null;
            
            renderBoard();
            renderRack();
        }
        
        function removeTile(row, col) {
            const placed = placedTiles.get(`${row},${col}`);
            if (placed) {
                myRack.splice(placed.rackIndex, 0, placed.letter);
                placedTiles.delete(`${row},${col}`);
                renderBoard();
                renderRack();
            }
        }
        
        function renderRack() {
            const rackDiv = document.getElementById('rack');
            rackDiv.innerHTML = '';
            
            if (!myRack || myRack.length === 0) {
                rackDiv.innerHTML = '<div style="color:#999; padding:20px;">No tiles in rack</div>';
                return;
            }
            
            myRack.forEach((tile, index) => {
                const tileDiv = document.createElement('div');
                tileDiv.className = 'rack-tile';
                if (selectedTileIndex === index) {
                    tileDiv.classList.add('selected');
                }
                tileDiv.innerHTML = tile === '?' ? '?' : tile;
                
                // Add score indicator
                const scores = {A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10,'?':0};
                const scoreSpan = document.createElement('span');
                scoreSpan.style.position = 'absolute';
                scoreSpan.style.bottom = '3px';
                scoreSpan.style.right = '5px';
                scoreSpan.style.fontSize = '12px';
                scoreSpan.style.color = '#666';
                scoreSpan.innerHTML = scores[tile] || 1;
                tileDiv.appendChild(scoreSpan);
                
                tileDiv.onclick = () => {
                    if (currentTurn !== myPlayerNumber) {
                        alert('Not your turn!');
                        return;
                    }
                    selectedTileIndex = index;
                    renderRack();
                };
                rackDiv.appendChild(tileDiv);
            });
        }
        
        function calculateScore() {
            let total = 0;
            const scores = {A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10,'?':0};
            for (const [pos, data] of placedTiles) {
                total += scores[data.letter] || 1;
            }
            return total;
        }
        
        function playWord() {
            if (placedTiles.size === 0) {
                alert('Place some tiles on the board first!');
                return;
            }
            
            const word = Array.from(placedTiles.values()).map(t => t.letter).join('');
            const score = calculateScore();
            
            console.log('Playing word:', word, 'Score:', score);
            
            socket.emit('playWord', {
                gameId: gameId,
                word: word,
                placements: Array.from(placedTiles.entries()),
                score: score
            }, (response) => {
                console.log('Play response:', response);
                if (response && response.success) {
                    placedTiles.clear();
                    selectedTileIndex = null;
                    renderBoard();
                    renderRack();
                } else {
                    alert('Invalid word! Try another word.');
                }
            });
        }
        
        function recallTiles() {
            for (const [pos, data] of placedTiles) {
                myRack.splice(data.rackIndex, 0, data.letter);
            }
            placedTiles.clear();
            selectedTileIndex = null;
            renderBoard();
            renderRack();
        }
        
        function exchangeTile() {
            if (selectedTileIndex === null) {
                alert('Click on a tile in your rack to select it for exchange');
                return;
            }
            
            const tile = myRack[selectedTileIndex];
            console.log('Exchanging tile:', tile);
            
            socket.emit('exchangeTiles', {
                gameId: gameId,
                tiles: [tile]
            }, (response) => {
                console.log('Exchange response:', response);
                if (response && response.success) {
                    selectedTileIndex = null;
                } else {
                    alert('Exchange failed: ' + (response?.error || 'Unknown error'));
                }
            });
        }
        
        function passTurn() {
            console.log('Passing turn');
            socket.emit('passTurn', { gameId: gameId }, (response) => {
                console.log('Pass response:', response);
                if (response && response.success) {
                    recallTiles();
                }
            });
        }
        
        // Attach button handlers
        document.getElementById('playWordBtn').onclick = playWord;
        document.getElementById('recallBtn').onclick = recallTiles;
        document.getElementById('exchangeBtn').onclick = exchangeTile;
        document.getElementById('passBtn').onclick = passTurn;
        
        console.log('Game page loaded! Board size: 15x15');
    </script>
</body>
</html>
