cat > index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabble Multiplayer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .join-screen {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
        }
        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #4caf50;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .game-container {
            display: none;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(15, 35px);
            gap: 1px;
            margin: 20px auto;
            justify-content: center;
        }
        .cell {
            width: 35px;
            height: 35px;
            background: #f5deb3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cell:hover {
            transform: scale(1.05);
            z-index: 1;
        }
        .rack {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .rack-tile {
            width: 50px;
            height: 50px;
            background: #fffef5;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .rack-tile:hover {
            transform: translateY(-5px);
        }
        .selected {
            border: 3px solid gold;
            transform: translateY(-10px);
        }
        .player-info {
            display: inline-block;
            margin: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            min-width: 150px;
        }
        .active {
            border: 2px solid gold;
            background: rgba(255,215,0,0.2);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        #message {
            margin: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            font-weight: bold;
        }
        .game-id-display {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 24px;
            letter-spacing: 2px;
            margin: 10px 0;
        }
        .error {
            color: #ff6b6b;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Scrabble Multiplayer</h1>
        
        <!-- Join Screen -->
        <div id="joinScreen" class="join-screen">
            <button id="createGameBtn">Create New Game</button>
            <button id="joinGameBtn">Join Existing Game</button>
            
            <div id="createDiv" style="display:none; margin-top:20px;">
                <input type="text" id="createName" placeholder="Your Name" autocomplete="off">
                <button id="confirmCreateBtn">Create Game</button>
                <button id="cancelCreateBtn">Cancel</button>
            </div>
            
            <div id="joinDiv" style="display:none; margin-top:20px;">
                <input type="text" id="joinCode" placeholder="Game Code" autocomplete="off" style="text-transform:uppercase">
                <input type="text" id="joinName" placeholder="Your Name" autocomplete="off">
                <button id="confirmJoinBtn">Join Game</button>
                <button id="cancelJoinBtn">Cancel</button>
            </div>
            
            <div id="waitingDiv" style="display:none; margin-top:20px;">
                <h3>Share this code with Player 2:</h3>
                <div class="game-id-display" id="gameCode"></div>
                <button id="copyCodeBtn">📋 Copy Code</button>
                <p style="margin-top:20px;">Waiting for second player to join...</p>
                <div class="loader"></div>
            </div>
        </div>
        
        <!-- Game Container -->
        <div id="gameContainer" class="game-container">
            <div>
                <div id="player1Info" class="player-info">
                    <strong id="p1Name">Player 1</strong><br>
                    Score: <span id="p1Score">0</span>
                </div>
                <div id="player2Info" class="player-info">
                    <strong id="p2Name">Player 2</strong><br>
                    Score: <span id="p2Score">0</span>
                </div>
            </div>
            
            <div id="board" class="board"></div>
            
            <div id="message">Waiting for game to start...</div>
            
            <div class="rack" id="rack"></div>
            
            <div>
                <button id="playBtn">▶ Play Word</button>
                <button id="recallBtn">↩ Recall</button>
                <button id="exchangeBtn">🔄 Exchange</button>
                <button id="passBtn">⏭ Pass</button>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let gameId = null;
        let myPlayerNum = null;
        let myRack = [];
        let currentTurn = 1;
        let selectedTile = null;
        let placedTiles = new Map();
        let board = Array(15).fill().map(() => Array(15).fill(null));
        
        // DOM Elements
        const joinScreen = document.getElementById('joinScreen');
        const gameContainer = document.getElementById('gameContainer');
        const createDiv = document.getElementById('createDiv');
        const joinDiv = document.getElementById('joinDiv');
        const waitingDiv = document.getElementById('waitingDiv');
        
        // Button event listeners
        document.getElementById('createGameBtn').onclick = () => {
            createDiv.style.display = 'block';
            joinDiv.style.display = 'none';
            waitingDiv.style.display = 'none';
        };
        
        document.getElementById('joinGameBtn').onclick = () => {
            createDiv.style.display = 'none';
            joinDiv.style.display = 'block';
            waitingDiv.style.display = 'none';
        };
        
        document.getElementById('cancelCreateBtn').onclick = () => {
            createDiv.style.display = 'none';
        };
        
        document.getElementById('cancelJoinBtn').onclick = () => {
            joinDiv.style.display = 'none';
        };
        
        document.getElementById('confirmCreateBtn').onclick = createGame;
        document.getElementById('confirmJoinBtn').onclick = joinGame;
        document.getElementById('copyCodeBtn').onclick = copyCode;
        
        document.getElementById('playBtn').onclick = playWord;
        document.getElementById('recallBtn').onclick = recallTiles;
        document.getElementById('exchangeBtn').onclick = exchangeTile;
        document.getElementById('passBtn').onclick = passTurn;
        
        function copyCode() {
            const code = document.getElementById('gameCode').innerText;
            navigator.clipboard.writeText(code);
            alert('Game code copied: ' + code);
        }
        
        function createGame() {
            const name = document.getElementById('createName').value.trim();
            if (!name) {
                alert('Please enter your name');
                return;
            }
            
            console.log('Creating game with name:', name);
            
            // Connect to socket if not already connected
            if (!socket) {
                socket = io();
                setupSocketListeners();
            }
            
            socket.emit('createGame', { playerName: name }, (response) => {
                console.log('Create game response:', response);
                if (response.success) {
                    gameId = response.gameId;
                    myPlayerNum = response.playerNum;
                    document.getElementById('gameCode').innerText = gameId;
                    createDiv.style.display = 'none';
                    waitingDiv.style.display = 'block';
                } else {
                    alert('Failed to create game: ' + (response.error || 'Unknown error'));
                }
            });
        }
        
        function joinGame() {
            const code = document.getElementById('joinCode').value.trim().toUpperCase();
            const name = document.getElementById('joinName').value.trim();
            
            if (!code || !name) {
                alert('Please enter game code and your name');
                return;
            }
            
            console.log('Joining game:', code, name);
            
            // Connect to socket if not already connected
            if (!socket) {
                socket = io();
                setupSocketListeners();
            }
            
            socket.emit('joinGame', { gameId: code, playerName: name }, (response) => {
                console.log('Join game response:', response);
                if (response.success) {
                    gameId = code;
                    myPlayerNum = response.playerNum;
                    startGame();
                } else {
                    alert('Failed to join: ' + (response.error || 'Unknown error'));
                }
            });
        }
        
        function startGame() {
            joinScreen.style.display = 'none';
            gameContainer.style.display = 'block';
        }
        
        function setupSocketListeners() {
            socket.on('connect', () => {
                console.log('Socket connected!', socket.id);
            });
            
            socket.on('connect_error', (error) => {
                console.error('Socket connection error:', error);
                alert('Connection error! Please refresh the page.');
            });
            
            socket.on('gameStateUpdate', (data) => {
                console.log('Game state update:', data);
                board = data.board;
                currentTurn = data.currentTurn;
                
                // Update player info
                document.getElementById('p1Name').innerText = data.players[1].name;
                document.getElementById('p1Score').innerText = data.players[1].score;
                document.getElementById('p2Name').innerText = data.players[2].name || 'Waiting...';
                document.getElementById('p2Score').innerText = data.players[2].score || 0;
                
                // Update active player highlight
                document.getElementById('player1Info').classList.toggle('active', currentTurn === 1);
                document.getElementById('player2Info').classList.toggle('active', currentTurn === 2);
                
                // Update my rack
                if (myPlayerNum === 1) {
                    myRack = data.players[1].rack || [];
                } else {
                    myRack = data.players[2].rack || [];
                }
                
                // Update message
                const isMyTurn = (currentTurn === myPlayerNum);
                const messageDiv = document.getElementById('message');
                
                if (!isMyTurn && currentTurn) {
                    messageDiv.innerText = `⏳ Waiting for Player ${currentTurn}'s turn...`;
                } else if (isMyTurn) {
                    messageDiv.innerText = '🎯 Your turn! Place tiles on the board and click Play Word';
                }
                
                if (data.lastPlay) {
                    messageDiv.innerText = `🎉 Player ${data.lastPlay.player} played "${data.lastPlay.word}" for ${data.lastPlay.score} points!`;
                    setTimeout(() => {
                        if (isMyTurn) {
                            messageDiv.innerText = '🎯 Your turn! Place tiles on the board and click Play Word';
                        }
                    }, 3000);
                }
                
                renderBoard();
                renderRack();
            });
            
            socket.on('playerDisconnected', (data) => {
                alert(`⚠️ Player ${data.playerNum} disconnected! The game will end.`);
                location.reload();
            });
        }
        
        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            
            for (let row = 0; row < 15; row++) {
                for (let col = 0; col < 15; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    const tile = board[row][col];
                    const placedTile = placedTiles.get(`${row},${col}`);
                    
                    if (placedTile) {
                        cell.innerText = placedTile.letter;
                        cell.style.background = '#c8e6c9';
                        cell.style.border = '2px solid #4caf50';
                        cell.onclick = () => removePlacedTile(row, col);
                    } else if (tile) {
                        cell.innerText = tile.letter;
                        cell.style.background = '#fffef5';
                    } else {
                        cell.style.background = '#f5deb3';
                        if (currentTurn === myPlayerNum && !tile) {
                            cell.onclick = () => selectBoardCell(row, col);
                        }
                    }
                    
                    boardDiv.appendChild(cell);
                }
            }
        }
        
        function selectBoardCell(row, col) {
            if (currentTurn !== myPlayerNum) {
                alert('Not your turn!');
                return;
            }
            
            if (board[row][col] !== null) {
                alert('Cell already occupied!');
                return;
            }
            
            if (placedTiles.has(`${row},${col}`)) {
                removePlacedTile(row, col);
                return;
            }
            
            if (selectedTile === null) {
                alert('Select a tile from your rack first!');
                return;
            }
            
            const tile = myRack[selectedTile];
            if (!tile) return;
            
            placedTiles.set(`${row},${col}`, {
                letter: tile,
                rackIndex: selectedTile
            });
            
            myRack.splice(selectedTile, 1);
            selectedTile = null;
            
            renderBoard();
            renderRack();
        }
        
        function removePlacedTile(row, col) {
            const placed = placedTiles.get(`${row},${col}`);
            if (placed) {
                myRack.splice(placed.rackIndex, 0, placed.letter);
                placedTiles.delete(`${row},${col}`);
                renderBoard();
                renderRack();
            }
        }
        
        function renderRack() {
            const rackDiv = document.getElementById('rack');
            rackDiv.innerHTML = '';
            
            if (!myRack || myRack.length === 0) {
                rackDiv.innerHTML = '<div style="color: #999;">No tiles in rack</div>';
                return;
            }
            
            myRack.forEach((tile, index) => {
                const tileDiv = document.createElement('div');
                tileDiv.className = 'rack-tile';
                if (selectedTile === index) {
                    tileDiv.classList.add('selected');
                }
                tileDiv.innerText = tile === '?' ? '?' : tile;
                
                // Add score indicator
                const scores = {
                    'A':1,'B':3,'C':3,'D':2,'E':1,'F':4,'G':2,'H':4,'I':1,'J':8,
                    'K':5,'L':1,'M':3,'N':1,'O':1,'P':3,'Q':10,'R':1,'S':1,'T':1,
                    'U':1,'V':4,'W':4,'X':8,'Y':4,'Z':10,'?':0
                };
                const score = scores[tile] || 1;
                const scoreSpan = document.createElement('span');
                scoreSpan.style.position = 'absolute';
                scoreSpan.style.bottom = '2px';
                scoreSpan.style.right = '4px';
                scoreSpan.style.fontSize = '10px';
                scoreSpan.innerText = score;
                tileDiv.appendChild(scoreSpan);
                
                tileDiv.onclick = () => {
                    if (currentTurn !== myPlayerNum) {
                        alert('Not your turn!');
                        return;
                    }
                    selectedTile = index;
                    renderRack();
                };
                
                rackDiv.appendChild(tileDiv);
            });
        }
        
        function calculateScore() {
            let total = 0;
            const scores = {
                'A':1,'B':3,'C':3,'D':2,'E':1,'F':4,'G':2,'H':4,'I':1,'J':8,
                'K':5,'L':1,'M':3,'N':1,'O':1,'P':3,'Q':10,'R':1,'S':1,'T':1,
                'U':1,'V':4,'W':4,'X':8,'Y':4,'Z':10,'?':0
            };
            
            for (const [pos, data] of placedTiles) {
                total += scores[data.letter] || 1;
            }
            return total;
        }
        
        function playWord() {
            if (placedTiles.size === 0) {
                alert('No tiles placed on the board!');
                return;
            }
            
            const word = Array.from(placedTiles.values()).map(t => t.letter).join('');
            const score = calculateScore();
            
            console.log('Playing word:', word, 'score:', score);
            
            socket.emit('playWord', {
                gameId: gameId,
                word: word,
                placements: Array.from(placedTiles.entries()),
                score: score
            }, (response) => {
                console.log('Play word response:', response);
                if (response.success) {
                    placedTiles.clear();
                    selectedTile = null;
                    renderBoard();
                    renderRack();
                } else {
                    alert('Invalid word: ' + (response.error || 'Word not in dictionary'));
                }
            });
        }
        
        function recallTiles() {
            for (const [pos, data] of placedTiles) {
                myRack.splice(data.rackIndex, 0, data.letter);
            }
            placedTiles.clear();
            selectedTile = null;
            renderBoard();
            renderRack();
        }
        
        function exchangeTile() {
            if (selectedTile === null) {
                alert('Select a tile from your rack to exchange!');
                return;
            }
            
            const tileToExchange = myRack[selectedTile];
            console.log('Exchanging tile:', tileToExchange);
            
            socket.emit('exchangeTiles', {
                gameId: gameId,
                tiles: [tileToExchange]
            }, (response) => {
                console.log('Exchange response:', response);
                if (response.success) {
                    selectedTile = null;
                } else {
                    alert('Failed to exchange: ' + (response.error || 'Unknown error'));
                }
            });
        }
        
        function passTurn() {
            console.log('Passing turn');
            socket.emit('passTurn', { gameId: gameId }, (response) => {
                console.log('Pass turn response:', response);
                if (response.success) {
                    recallTiles();
                }
            });
        }
        
        console.log('Game loaded! Ready to play.');
    </script>
</body>
</html>
EOF
