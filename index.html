<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrabble Multiplayer</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        .join-screen {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
        }
        input, button {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
        }
        button {
            background: #4caf50;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { background: #45a049; transform: translateY(-2px); }
        .game-container { display: none; }
        .board {
            display: grid;
            grid-template-columns: repeat(15, 35px);
            gap: 1px;
            margin: 20px auto;
            justify-content: center;
        }
        .cell {
            width: 35px;
            height: 35px;
            background: #f5deb3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }
        .rack {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .rack-tile {
            width: 50px;
            height: 50px;
            background: #fffef5;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            color: #2c1810;
        }
        .rack-tile.selected {
            border: 3px solid gold;
            transform: translateY(-10px);
        }
        .player-info {
            display: inline-block;
            margin: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            min-width: 150px;
        }
        .active {
            border: 2px solid gold;
            background: rgba(255,215,0,0.2);
        }
        #message {
            margin: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
        }
        .game-code {
            background: #000;
            padding: 15px;
            border-radius: 10px;
            font-size: 28px;
            font-family: monospace;
            margin: 10px 0;
        }
        .status { margin-top: 20px; color: #ffd700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Scrabble Multiplayer</h1>
        
        <!-- Join Screen -->
        <div id="joinScreen" class="join-screen">
            <h2>Welcome!</h2>
            <button id="createBtn">🎮 Create New Game</button>
            <button id="joinBtn">🔗 Join Existing Game</button>
            
            <div id="createPanel" style="display:none; margin-top:20px;">
                <input type="text" id="playerName" placeholder="Your Name" autocomplete="off">
                <button id="confirmCreate">Create Game</button>
                <button id="cancelCreate">Cancel</button>
            </div>
            
            <div id="joinPanel" style="display:none; margin-top:20px;">
                <input type="text" id="gameCode" placeholder="Game Code" autocomplete="off" style="text-transform:uppercase">
                <input type="text" id="joinPlayerName" placeholder="Your Name" autocomplete="off">
                <button id="confirmJoin">Join Game</button>
                <button id="cancelJoin">Cancel</button>
            </div>
            
            <div id="waitingPanel" style="display:none; margin-top:20px;">
                <h3>Share this code:</h3>
                <div class="game-code" id="gameCodeDisplay"></div>
                <button id="copyCode">📋 Copy Code</button>
                <div class="status">⏳ Waiting for player 2 to join...</div>
            </div>
        </div>
        
        <!-- Game Container -->
        <div id="gameContainer" class="game-container">
            <div>
                <div id="p1Info" class="player-info">
                    <strong id="p1Name">Player 1</strong><br>
                    Score: <span id="p1Score">0</span>
                </div>
                <div id="p2Info" class="player-info">
                    <strong id="p2Name">Player 2</strong><br>
                    Score: <span id="p2Score">0</span>
                </div>
            </div>
            
            <div id="board"></div>
            <div id="message">Loading game...</div>
            <div id="rack" class="rack"></div>
            
            <div>
                <button id="playWordBtn">▶ Play Word</button>
                <button id="recallBtn">↩ Recall</button>
                <button id="exchangeBtn">🔄 Exchange</button>
                <button id="passBtn">⏭ Pass</button>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let socket = null;
        let gameId = null;
        let myPlayerNumber = null;
        let currentTurn = 1;
        let myRack = [];
        let selectedTileIndex = null;
        let placedTiles = new Map();
        let boardData = Array(15).fill().map(() => Array(15).fill(null));
        
        // DOM elements
        const joinScreen = document.getElementById('joinScreen');
        const gameContainer = document.getElementById('gameContainer');
        const createPanel = document.getElementById('createPanel');
        const joinPanel = document.getElementById('joinPanel');
        const waitingPanel = document.getElementById('waitingPanel');
        
        // Button handlers
        document.getElementById('createBtn').onclick = () => {
            createPanel.style.display = 'block';
            joinPanel.style.display = 'none';
            waitingPanel.style.display = 'none';
        };
        
        document.getElementById('joinBtn').onclick = () => {
            createPanel.style.display = 'none';
            joinPanel.style.display = 'block';
            waitingPanel.style.display = 'none';
        };
        
        document.getElementById('cancelCreate').onclick = () => {
            createPanel.style.display = 'none';
        };
        
        document.getElementById('cancelJoin').onclick = () => {
            joinPanel.style.display = 'none';
        };
        
        document.getElementById('confirmCreate').onclick = () => {
            const playerName = document.getElementById('playerName').value.trim();
            if (!playerName) {
                alert('Please enter your name');
                return;
            }
            createGame(playerName);
        };
        
        document.getElementById('confirmJoin').onclick = () => {
            const code = document.getElementById('gameCode').value.trim().toUpperCase();
            const playerName = document.getElementById('joinPlayerName').value.trim();
            if (!code || !playerName) {
                alert('Please enter game code and your name');
                return;
            }
            joinGame(code, playerName);
        };
        
        document.getElementById('copyCode').onclick = () => {
            const code = document.getElementById('gameCodeDisplay').innerText;
            navigator.clipboard.writeText(code);
            alert('Game code copied: ' + code);
        };
        
        // Game functions
        function createGame(playerName) {
            console.log('Creating game for:', playerName);
            
            socket = io({
                transports: ['websocket', 'polling']
            });
            
            socket.on('connect', () => {
                console.log('Socket connected! ID:', socket.id);
                socket.emit('createGame', { playerName: playerName }, (response) => {
                    console.log('Create game response:', response);
                    if (response && response.success) {
                        gameId = response.gameId;
                        myPlayerNumber = response.playerNum;
                        document.getElementById('gameCodeDisplay').innerText = gameId;
                        createPanel.style.display = 'none';
                        waitingPanel.style.display = 'block';
                        setupGameListeners();
                    } else {
                        alert('Failed to create game: ' + (response?.error || 'Unknown error'));
                    }
                });
            });
            
            socket.on('connect_error', (error) => {
                console.error('Connection error:', error);
                alert('Failed to connect to server. Please refresh the page.');
            });
        }
        
        function joinGame(code, playerName) {
            console.log('Joining game:', code, playerName);
            
            socket = io({
                transports: ['websocket', 'polling']
            });
            
            socket.on('connect', () => {
                console.log('Socket connected! ID:', socket.id);
                socket.emit('joinGame', { gameId: code, playerName: playerName }, (response) => {
                    console.log('Join game response:', response);
                    if (response && response.success) {
                        gameId = code;
                        myPlayerNumber = response.playerNum;
                        startGame();
                        setupGameListeners();
                    } else {
                        alert('Failed to join game: ' + (response?.error || 'Unknown error'));
                    }
                });
            });
            
            socket.on('connect_error', (error) => {
                console.error('Connection error:', error);
                alert('Failed to connect to server. Please refresh the page.');
            });
        }
        
        function startGame() {
            joinScreen.style.display = 'none';
            gameContainer.style.display = 'block';
        }
        
        function setupGameListeners() {
            socket.on('gameStateUpdate', (data) => {
                console.log('Game state update received:', data);
                boardData = data.board;
                currentTurn = data.currentTurn;
                
                // Update player info
                document.getElementById('p1Name').innerText = data.players[1].name;
                document.getElementById('p1Score').innerText = data.players[1].score;
                document.getElementById('p2Name').innerText = data.players[2].name || 'Waiting...';
                document.getElementById('p2Score').innerText = data.players[2].score || 0;
                
                // Highlight active player
                document.getElementById('p1Info').classList.toggle('active', currentTurn === 1);
                document.getElementById('p2Info').classList.toggle('active', currentTurn === 2);
                
                // Update my rack
                if (myPlayerNumber === 1) {
                    myRack = data.players[1].rack || [];
                } else {
                    myRack = data.players[2].rack || [];
                }
                
                // Update message
                const isMyTurn = (currentTurn === myPlayerNumber);
                const msgDiv = document.getElementById('message');
                if (isMyTurn) {
                    msgDiv.innerHTML = '🎯 YOUR TURN - Place tiles and click Play Word!';
                    msgDiv.style.background = 'rgba(76, 175, 80, 0.3)';
                } else {
                    msgDiv.innerHTML = `⏳ Waiting for Player ${currentTurn}'s turn...`;
                    msgDiv.style.background = 'rgba(0,0,0,0.5)';
                }
                
                if (data.lastPlay) {
                    msgDiv.innerHTML = `🎉 Player ${data.lastPlay.player} played "${data.lastPlay.word}" for ${data.lastPlay.score} points!`;
                    setTimeout(() => {
                        if (isMyTurn) {
                            msgDiv.innerHTML = '🎯 YOUR TURN - Place tiles and click Play Word!';
                        } else {
                            msgDiv.innerHTML = `⏳ Waiting for Player ${currentTurn}'s turn...`;
                        }
                    }, 3000);
                }
                
                renderBoard();
                renderRack();
            });
            
            socket.on('playerDisconnected', (data) => {
                alert(`Player ${data.playerNum} disconnected! Game will end.`);
                location.reload();
            });
        }
        
        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = '';
            
            for (let row = 0; row < 15; row++) {
                for (let col = 0; col < 15; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    const permanentTile = boardData[row][col];
                    const myPlacedTile = placedTiles.get(`${row},${col}`);
                    
                    if (myPlacedTile) {
                        cell.innerText = myPlacedTile.letter;
                        cell.style.background = '#c8e6c9';
                        cell.style.border = '2px solid #4caf50';
                        cell.onclick = () => removeTile(row, col);
                    } else if (permanentTile) {
                        cell.innerText = permanentTile.letter;
                        cell.style.background = '#fffef5';
                    } else {
                        cell.style.background = '#f5deb3';
                        if (currentTurn === myPlayerNumber) {
                            cell.onclick = () => placeTile(row, col);
                        }
                    }
                    
                    boardDiv.appendChild(cell);
                }
            }
        }
        
        function placeTile(row, col) {
            if (currentTurn !== myPlayerNumber) {
                alert('Not your turn!');
                return;
            }
            
            if (boardData[row][col] !== null) {
                alert('Cell already has a tile!');
                return;
            }
            
            if (selectedTileIndex === null) {
                alert('Select a tile from your rack first!');
                return;
            }
            
            const tile = myRack[selectedTileIndex];
            if (!tile) return;
            
            placedTiles.set(`${row},${col}`, {
                letter: tile,
                rackIndex: selectedTileIndex
            });
            
            myRack.splice(selectedTileIndex, 1);
            selectedTileIndex = null;
            
            renderBoard();
            renderRack();
        }
        
        function removeTile(row, col) {
            const placed = placedTiles.get(`${row},${col}`);
            if (placed) {
                myRack.splice(placed.rackIndex, 0, placed.letter);
                placedTiles.delete(`${row},${col}`);
                renderBoard();
                renderRack();
            }
        }
        
        function renderRack() {
            const rackDiv = document.getElementById('rack');
            rackDiv.innerHTML = '';
            
            if (!myRack || myRack.length === 0) {
                rackDiv.innerHTML = '<div style="color:#999;">No tiles in rack</div>';
                return;
            }
            
            myRack.forEach((tile, index) => {
                const tileDiv = document.createElement('div');
                tileDiv.className = 'rack-tile';
                if (selectedTileIndex === index) {
                    tileDiv.classList.add('selected');
                }
                tileDiv.innerText = tile === '?' ? '?' : tile;
                tileDiv.onclick = () => {
                    if (currentTurn !== myPlayerNumber) {
                        alert('Not your turn!');
                        return;
                    }
                    selectedTileIndex = index;
                    renderRack();
                };
                rackDiv.appendChild(tileDiv);
            });
        }
        
        function calculateScore() {
            let total = 0;
            const scores = {A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10,'?':0};
            for (const [pos, data] of placedTiles) {
                total += scores[data.letter] || 1;
            }
            return total;
        }
        
        function playWord() {
            if (placedTiles.size === 0) {
                alert('Place some tiles on the board first!');
                return;
            }
            
            const word = Array.from(placedTiles.values()).map(t => t.letter).join('');
            const score = calculateScore();
            
            console.log('Playing word:', word, 'Score:', score);
            
            socket.emit('playWord', {
                gameId: gameId,
                word: word,
                placements: Array.from(placedTiles.entries()),
                score: score
            }, (response) => {
                console.log('Play response:', response);
                if (response && response.success) {
                    placedTiles.clear();
                    selectedTileIndex = null;
                    renderBoard();
                    renderRack();
                } else {
                    alert('Invalid word! Try another word.');
                }
            });
        }
        
        function recallTiles() {
            for (const [pos, data] of placedTiles) {
                myRack.splice(data.rackIndex, 0, data.letter);
            }
            placedTiles.clear();
            selectedTileIndex = null;
            renderBoard();
            renderRack();
        }
        
        function exchangeTile() {
            if (selectedTileIndex === null) {
                alert('Select a tile to exchange');
                return;
            }
            
            const tile = myRack[selectedTileIndex];
            socket.emit('exchangeTiles', {
                gameId: gameId,
                tiles: [tile]
            }, (response) => {
                if (response && response.success) {
                    selectedTileIndex = null;
                } else {
                    alert('Exchange failed');
                }
            });
        }
        
        function passTurn() {
            socket.emit('passTurn', { gameId: gameId }, (response) => {
                if (response && response.success) {
                    recallTiles();
                }
            });
        }
        
        // Attach button handlers
        document.getElementById('playWordBtn').onclick = playWord;
        document.getElementById('recallBtn').onclick = recallTiles;
        document.getElementById('exchangeBtn').onclick = exchangeTile;
        document.getElementById('passBtn').onclick = passTurn;
        
        console.log('Game page loaded!');
    </script>
</body>
</html>
